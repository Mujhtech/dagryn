version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd/dagryn/main.go
    binary: dagryn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mujhtech/dagryn/internal/version.Version={{.Version}}
      - -X github.com/mujhtech/dagryn/internal/version.Commit={{.Commit}}
      - -X github.com/mujhtech/dagryn/internal/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
    - title: Refactoring
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
    - title: Others
      order: 999

homebrew_casks:
  - repository:
      owner: Mujhtech
      name: homebrew-tap
    directory: Casks
    homepage: "https://github.com/Mujhtech/dagryn"
    description: "Local-first workflow orchestrator with DAG-based task execution"
    license: "MIT"
    install: |
      bin.install "dagryn"
    test: |
      system "#{bin}/dagryn", "version"

release:
  github:
    owner: Mujhtech
    name: dagryn
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

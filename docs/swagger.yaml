host: localhost:9000
info:
  contact:
    email: support@dagryn.dev
    name: Dagryn Support
    url: https://github.com/mujhtech/dagryn
  description: Local-first, self-hosted developer workflow orchestrator API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Dagryn API
  version: "1.0"
paths:
  /api/v1/api-keys:
    get:
      description: Returns all API keys for the current user (user-scoped keys)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_api_handlers.APIKeyResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List user API keys
      tags:
      - api-keys
    post:
      consumes:
      - application/json
      description: Creates a new user-scoped API key (access to all user's projects)
      parameters:
      - description: Create API key request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.CreateAPIKeyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pkg_api_handlers.APIKeyCreatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create user API key
      tags:
      - api-keys
  /api/v1/api-keys/{keyId}:
    delete:
      description: Revokes a user-scoped API key
      parameters:
      - description: API Key ID
        format: uuid
        in: path
        name: keyId
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Revoke user API key
      tags:
      - api-keys
  /api/v1/auth/{provider}:
    get:
      description: Initiates OAuth authentication with the specified provider
      parameters:
      - description: OAuth provider (github, google)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.OAuthStartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      summary: Start OAuth flow
      tags:
      - auth
  /api/v1/auth/{provider}/callback:
    post:
      consumes:
      - application/json
      description: Handles OAuth callback from providers and returns tokens
      parameters:
      - description: OAuth provider (github, google)
        in: path
        name: provider
        required: true
        type: string
      - description: OAuth callback data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.OAuthCallbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      summary: OAuth callback
      tags:
      - auth
  /api/v1/auth/device:
    post:
      description: Initiates device code flow for CLI authentication
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.DeviceCodeResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      summary: Request device code
      tags:
      - auth
  /api/v1/auth/device/authorize:
    post:
      consumes:
      - application/json
      description: Authorizes a device code (called by user in browser)
      parameters:
      - description: Device authorize request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.DeviceAuthorizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Authorize device
      tags:
      - auth
  /api/v1/auth/device/deny:
    post:
      consumes:
      - application/json
      description: Denies a device code authorization
      parameters:
      - description: Device deny request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.DeviceAuthorizeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Deny device
      tags:
      - auth
  /api/v1/auth/device/poll:
    post:
      consumes:
      - application/json
      description: Polls for device code authorization status
      parameters:
      - description: Device code poll request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.DeviceCodePollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "428":
          description: Authorization pending
          schema:
            $ref: '#/definitions/pkg_api_handlers.DeviceCodePendingResponse'
      summary: Poll device code
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the current access token and optionally all tokens
      parameters:
      - description: Logout options
        in: body
        name: body
        schema:
          $ref: '#/definitions/pkg_api_handlers.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.SuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - auth
  /api/v1/auth/providers:
    get:
      description: Returns the list of available OAuth authentication providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            description: List of exchange rates
            items:
              $ref: '#/definitions/github_com_mujhtech_dagryn_pkg_api_dto.AuthProvider'
            type: array
      summary: List authentication providers
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a refresh token for a new access token
      parameters:
      - description: Refresh token request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/pkg_api_handlers.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/capabilities:
    get:
      description: Returns the server's mode, available features, and navigation items
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.CapabilitiesResponse'
      summary: Get server capabilities
      tags:
      - capabilities
  /api/v1/dashboard/overview:
    get:
      description: Returns projects with inline stats and recent runs across all user
        projects
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.DashboardOverviewResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard overview
      tags:
      - dashboard
  /api/v1/invitations:
    get:
      description: Returns all pending invitations for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_api_handlers.InvitationResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List pending invitations
      tags:
      - invitations
  /api/v1/invitations/{token}/accept:
    post:
      description: Accepts a pending invitation to join a team or project
      parameters:
      - description: Invitation token
        in: path
        name: token
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_api_handlers.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_api_handlers.ErrorResponse'
        "404":
          description: Not Found
